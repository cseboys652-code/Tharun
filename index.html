<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
}

/* LOGIN PAGE */
#login {
    text-align: center;
    margin-top: 60px;
    padding: 10px;
}

.box {
    width: 90%;
    max-width: 360px;
    margin: auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,0,0,0.2);
}

/* LOGO */
.box img {
    width: 110px;
    height: auto;
    margin-bottom: 10px;
}

input {
    width: 95%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    background: #c00000;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}

/* HOME PAGE */
#home {
    display: none;
    text-align: center;
}

header {
    background: #c00000;
    color: white;
    padding: 20px;
}

.card {
    width: 85%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.home-logo {
    width: 120px;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login">
    <div class="box">

        <!-- IMPORTANT: logo.png must be in SAME folder as index.html -->
        <img src="logo.png" alt="College Logo">

        <h2>Adhiparasakthi Engineering College</h2>
        <p>Melmaruvathur</p>

        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="msg" style="color:red;"></p>

    </div>
</div>

<!-- HOME PAGE -->
<div id="home">

<header>
    <h1>Welcome to College Portal</h1>
    <p>Adhiparasakthi Engineering College, Melmaruvathur</p>
</header>

<img class="home-logo" src="logo.png" alt="College Logo">

<div class="card">
    <h2>Student Dashboard</h2>
    <p>✔ Attendance</p>
    <p>✔ Results</p>
    <p>✔ Department Info</p>
</div>

</div>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("home").style.display = "block";
    } else {
        document.getElementById("msg").innerText = "Invalid username or password!";
    }
}
</script>

</body>
</html>
